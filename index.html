<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Vayusakti Future Construct | Stealth Recon</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,200;0,300;1,200;1,300&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #040608;
            --accent: #31899a;
            --accent-glow: rgba(49, 137, 154, 0.40);
            --text-main: rgba(209, 219, 221, 0.85);
            --text-dim: rgba(49, 137, 154, 0.70);
            --gold: #C8972A;

            /* Night Overlays */
            --scanline-color: rgba(0,0,0,0.18);
            --vignette-color: rgba(4,6,8,0.95);
            --top-accent-grad: linear-gradient(to right, transparent, var(--accent), transparent);
            --frame-border: rgba(49, 137, 154, 0.35);
            --frame-inner: rgba(49, 137, 154, 0.15);

            /* Night Terminal */
            --terminal-bg: rgba(4, 6, 8, 0.85);
            --terminal-border: rgba(49, 137, 154, 0.25);
            --terminal-text: #3F5E63;
            
            /* Logo Glow */
            --logo-drop1: 0 0 16px var(--accent-glow);
            --logo-drop2: 0 0 45px rgba(49, 137, 154, 0.22);
        }

        body.day-mode {
            --bg-color: #556B60; 
            --accent: #E3EBF0;
            --accent-glow: rgba(227, 235, 240, 0.40);
            --text-main: #FFFFFF;
            --text-dim: rgba(227, 235, 240, 0.85);
            --gold: #F2C94C;

            /* Day Overlays */
            --scanline-color: rgba(0, 0, 0, 0.05); 
            --vignette-color: rgba(10, 20, 15, 0.75); 
            --top-accent-grad: linear-gradient(to right, transparent, rgba(227, 235, 240, 0.6), transparent);
            --frame-border: rgba(255, 255, 255, 0.25);
            --frame-inner: rgba(255, 255, 255, 0.15);

            /* Day Terminal */
            --terminal-bg: rgba(10, 20, 15, 0.65);
            --terminal-border: rgba(255, 255, 255, 0.20);
            --terminal-text: #DDE5EA;
            
            /* Logo Glow */
            --logo-drop1: 0 0 20px rgba(0,0,0, 0.8); 
            --logo-drop2: 0 0 50px rgba(0,0,0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            overflow: hidden;
            transition: background-color 1.5s ease, color 1.5s ease;
        }

        /* --- PARALLAX SCENE --- */
        #scene {
            position: fixed;
            inset: -10%;
            width: 120%;
            height: 120%;
            z-index: 1;
            will-change: transform;
        }

        .layer-bg-day, .layer-bg-night {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            /* Native 16:9 panoramic images scale vertically across monitors flawlessly */
            transition: opacity 1.5s ease;
            z-index: 0;
            pointer-events: none;
        }

        .layer-bg-night {
            opacity: 1;
            filter: contrast(1.1);
        }

        .layer-bg-day {
            opacity: 0;
            filter: brightness(0.95) contrast(1.15) saturate(1.1);
        }

        body.day-mode .layer-bg-night {
            opacity: 0;
        }

        body.day-mode .layer-bg-day {
            opacity: 1;
        }

        /* --- OVERLAYS --- */
        .scanlines, .vignette, .top-accent, .iso-frame, .iso-frame-inner { transition: all 1.5s ease; }
        
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 8;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                var(--scanline-color) 1px
            );
            background-size: 100% 4px;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: 7;
            pointer-events: none;
            background: radial-gradient(ellipse 90% at center, transparent 0%, var(--vignette-color) 100%);
        }

        .top-accent {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            z-index: 20;
            background: var(--top-accent-grad);
        }

        /* --- ISO FRAME --- */
        .iso-frame {
            position: fixed;
            inset: 16px;
            border: 0.6px solid var(--frame-border);
            z-index: 9;
            pointer-events: none;
        }

        .iso-frame-inner {
            position: absolute;
            inset: 8px;
            border: 0.3px solid var(--frame-inner);
        }

        .bracket {
            position: absolute;
            width: 18px;
            height: 18px;
            border-style: solid;
            border-color: rgba(49, 137, 154, 0.70);
            border-width: 0.8px 0 0 0.8px;
            transition: border-color 1.5s ease;
        }
        body.day-mode .bracket { border-color: rgba(255, 255, 255, 0.45); }

        .tl { top: -0.8px; left: -0.8px; }
        .tr { top: -0.8px; right: -0.8px; transform: rotate(90deg); }
        .bl { bottom: -0.8px; left: -0.8px; transform: rotate(-90deg); }
        .br { bottom: -0.8px; right: -0.8px; transform: rotate(180deg); }

        /* --- TOGGLE BUTTON --- */
        .optics-toggle {
            position: fixed;
            top: 36px;
            right: 48px;
            z-index: 25;
            font-family: 'Barlow Condensed', monospace;
            font-size: 10px;
            letter-spacing: 0.25em;
            color: var(--accent);
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--frame-border);
            padding: 8px 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .optics-toggle:hover {
            background: rgba(49, 137, 154, 0.3);
            color: #FFF;
            box-shadow: 0 0 12px var(--accent-glow);
        }
        body.day-mode .optics-toggle:hover { background: rgba(255, 255, 255, 0.15); border-color: #FFF; }

        /* --- NORTH ARROW --- */
        .north-arrow {
            position: fixed;
            bottom: 64px;
            left: 24px;
            z-index: 10;
            opacity: 0.25;
            color: var(--accent);
            transition: color 1.5s ease;
        }

        /* --- MAIN CONTENT CENTER --- */
        .main-content {
            position: fixed;
            inset: 0;
            top: -60px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            text-align: center;
            pointer-events: none; 
        }

        .brand-container {
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.4s;
            position: relative;
        }

        .brand-img {
            width: min(320px, 64vw);
            height: auto;
            filter: drop-shadow(var(--logo-drop1)) drop-shadow(var(--logo-drop2));
            transition: opacity 1.5s ease, filter 1.5s ease;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #brandImgDay { opacity: 0; }
        #brandImgNight { opacity: 1; }
        body.day-mode #brandImgNight { opacity: 0; }
        body.day-mode #brandImgDay { opacity: 1; }

        .brand-spacer {
            width: min(320px, 64vw);
            padding-bottom: 22%; 
        }

        .gold-rule {
            width: 36px;
            height: 1px;
            background: var(--gold);
            box-shadow: 0 0 10px rgba(200, 151, 42, 0.6);
            margin: 20px auto;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.6s;
            transition: background 1.5s ease, box-shadow 1.5s ease;
        }

        .telemetry {
            font-family: 'Barlow Condensed', monospace;
            font-size: 11px;
            letter-spacing: 0.22em;
            color: var(--accent);
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.8s;
            transition: color 1.5s ease;
            text-shadow: 0 0 6px rgba(0,0,0,0.8), 0 0 12px rgba(0,0,0,0.4);
        }

        .blink { animation: blinkAnim 2.8s infinite; }

        .cryptic {
            font-style: italic;
            font-weight: 300;
            font-size: clamp(14px, 2vw, 19px);
            color: var(--text-main);
            letter-spacing: 0.08em;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 1s;
            text-shadow: 0 0 8px rgba(0,0,0,0.9); 
        }

        /* --- CONTACT SECTION (BOTTOM) --- */
        .contact-group {
            position: fixed;
            bottom: 60px; 
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            opacity: 0;
            text-align: center;
            z-index: 15;
            animation: fadeUpContact 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 1.2s;
        }

        .contact-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 9px;
            letter-spacing: 0.30em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 4px;
            transition: color 1.5s ease;
            text-shadow: 0 0 6px rgba(0,0,0,0.8);
        }

        .email-link {
            font-size: 13px;
            color: var(--text-main);
            letter-spacing: 0.06em;
            text-decoration: none;
            border-bottom: 1px solid var(--frame-inner);
            transition: all 0.3s ease;
            pointer-events: auto; 
            text-shadow: 0 0 8px rgba(0,0,0,0.9);
        }
        .email-link:hover { border-color: var(--accent); color: var(--accent); }

        /* --- FOOTER TERMINAL --- */
        .footer-terminal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 16;
            background: var(--terminal-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--terminal-border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Barlow Condensed', monospace;
            font-size: 9px;
            text-transform: uppercase;
            color: var(--terminal-text);
            letter-spacing: 0.12em;
            transition: all 1.5s ease;
        }

        .terminal-side { display: flex; flex-direction: column; gap: 2px; }
        .terminal-right { text-align: right; }

        .node-indicator { color: var(--accent); animation: terminalBlink 4s infinite; transition: color 1.5s ease; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpContact {
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes blinkAnim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        @keyframes terminalBlink {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.25; }
        }
    </style>
</head>

    <!-- Scripts -->
    <script>
        // Toggler Logic
        const opticsToggle = document.getElementById('opticsToggle');
        const body = document.body;
        const altText = document.getElementById('altText');

        opticsToggle.addEventListener('click', () => {
            body.classList.toggle('day-mode');
            
            if (body.classList.contains('day-mode')) {
                opticsToggle.textContent = '[ OPTICS : STRATO_RECON ]';
            } else {
                opticsToggle.textContent = '[ OPTICS : NIGHT_VISION ]';
            }
        });

        // Parallax Engine
        const scene = document.getElementById('scene');
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        const lerp = 0.06;

        const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (!isMobile) {
            window.addEventListener('mousemove', (e) => {
                // Scale movement slightly to ensure image edges don't show (-10% margin gives us plenty of room)
                const x = (e.clientX / window.innerWidth - 0.5);
                const y = (e.clientY / window.innerHeight - 0.5);
                targetX = x * -44;
                targetY = y * -28;
            });
        } else {
            window.addEventListener('deviceorientation', (e) => {
                const x = (e.gamma / 45); 
                const y = ((e.beta - 45) / 45);
                targetX = Math.max(-1, Math.min(1, x)) * -22;
                targetY = Math.max(-1, Math.min(1, y)) * -14;
            });
        }

        function animate() {
            currentX += (targetX - currentX) * lerp;
            currentY += (targetY - currentY) * lerp;
            scene.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
